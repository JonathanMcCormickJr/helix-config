# Jonathan's Helix Config
# 2026-04-15
# License: Unlicense (public domain)
# 
# This file can be placed in a spot like `~/.config/helix/config.toml` 
# to enable these settings for all projects for a given Ubuntu user. 

theme = "autumn_night"

[editor]
line-number = "relative"
cursorline = true
color-modes = true
bufferline = "multiple"
true-color = true
rulers = [100]
auto-save = true
idle-timeout = 50
completion-trigger-len = 1

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
# Note: git-ignore and git-exclude are enabled (default) so that the file
# picker does not index the `target/` directory in Rust projects, which can
# contain millions of files and cause significant slowdowns.

[editor.indent-guides]
render = true
character = "╎"

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-type"]

[editor.soft-wrap]
enable = true
max-wrap = 25
max-indent-retain = 40
wrap-indicator = "↪ "
